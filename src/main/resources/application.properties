# Pinecone Configuration
pinecone.api.key=${PINECONE_API_KEY}
pinecone.environment=your-environment
pinecone.index.name=sql-assistant-index
# IMPORTANT: Pinecone index must be created with dimension=1024 (Voyage voyage-3.5).
# The old ada-002 (1536) index is no longer compatible.

# Voyage Configuration
voyage.api.key=${VOYAGE_API_KEY}

# Application Settings
app.pdf.max-size-mb=20
app.chunk.max-tokens=5000

# Server Configuration
server.port=8080
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Database Configuration (for AIResponseHistory persistence)
spring.datasource.url=jdbc:postgresql://localhost:5432/sql_assistant_db
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Scheduling Configuration
scheduler.pool.size=5

# Logging
logging.level.com.ai.assistant=DEBUG
logging.level.org.springframework.web=INFO