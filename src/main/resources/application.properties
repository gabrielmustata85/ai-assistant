# Copilot Configuration
copilot.api.key=your-copilot-api-key-here

# Pinecone Configuration
pinecone.api.key=your-pinecone-api-key
pinecone.environment=your-environment
pinecone.index.name=sql-assistant-index

# Application Settings
app.pdf.max-size-mb=20
app.chunk.max-tokens=5000

# Server Configuration
server.port=8080
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Database Configuration (for AIResponseHistory persistence)
spring.datasource.url=jdbc:postgresql://localhost:5432/sql_assistant_db
spring.datasource.username=your-db-username
spring.datasource.password=your-db-password
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Scheduling Configuration
scheduler.pool.size=5

# Logging
logging.level.com.ai.assistant=DEBUG
logging.level.org.springframework.web=INFO