# Pinecone Configuration
pinecone.api.key=${PINECONE_API_KEY:}
pinecone.environment=your-environment
pinecone.index.name=fiscal-assistant-index
pinecone.host=${PINECONE_HOST:}
# IMPORTANT: Pinecone index must be created with dimension=1024 (Voyage voyage-3.5).
# The old ada-002 (1536) index is no longer compatible.

# Voyage Configuration
voyage.api.key=${VOYAGE_API_KEY:}

# Application Settings
app.pdf.max-size-mb=20
app.chunk.max-tokens=5000

# Consum AI / limite (Free = fereastră scurtă, agresivă; plătit = lunar)
usage.free.token-limit=${USAGE_FREE_TOKEN_LIMIT:50000}
usage.free.window-seconds=${USAGE_FREE_WINDOW_SECONDS:14400}
usage.plan.pro-limit=${USAGE_PLAN_PRO_LIMIT:5000000}
usage.plan.max-limit=${USAGE_PLAN_MAX_LIMIT:20000000}
usage.paid.window-seconds=${USAGE_PAID_WINDOW_SECONDS:2592000}

# Server Configuration
server.port=8080
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Database Configuration (for AIResponseHistory persistence)
spring.datasource.url=jdbc:postgresql://localhost:5432/sql_assistant_db?stringtype=unspecified
spring.datasource.username=${DB_USER:}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Scheduling Configuration
scheduler.pool.size=5

# Logging
logging.level.com.ai.assistant=DEBUG
logging.level.org.springframework.web=INFO

# JWT Configuration
jwt.secret=${JWT_SECRET}